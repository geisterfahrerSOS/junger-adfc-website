services:
  svelte-app:
    image: node:20-alpine
    container_name: svelte-app-dev
    restart: unless-stopped
    working_dir: /app
    # Wir spiegeln deinen aktuellen Ordner direkt in den Container
    volumes:
      - .:/app
    networks:
      - any-sync-network
    environment:
      - PORT=3000
      - ORIGIN=https://junger-adfc-rhein-neckar.de
    # Wir starten den Svelte-Entwicklungsserver
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 3000"

networks:
  any-sync-network:
    external: true
    name: any-sync-dockercompose_default
