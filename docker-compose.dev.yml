services:
  svelte-dev:
    image: node:20-alpine
    container_name: svelte-app-dev
    restart: unless-stopped
    working_dir: /app
    volumes:
      - .:/app
    # Wir öffnen Port 5173 zum Server-Host, aber nicht zu Traefik
    ports:
      - "127.0.0.1:5173:5173"
    environment:
      - PORT=5173
    # Startet den Dev-Server ohne unnötige Installation
    command: npm run dev -- --host 0.0.0.0 --port 5173

networks:
  # Wir brauchen kein externes Netzwerk für Dev, da wir SSH-Tunneling nutzen
  default:
    name: svelte-dev-net
